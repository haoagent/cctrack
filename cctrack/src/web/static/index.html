<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cctrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- Minimal Header -->
    <header class="header">
      <span class="logo">cctrack</span>
      <nav class="tabs" id="team-tabs"></nav>
      <div class="header-right">
        <button class="icon-btn" id="theme-toggle"><span id="theme-icon">&#9790;</span></button>
      </div>
    </header>

    <!-- Hero: one number -->
    <section class="hero">
      <div class="hero-main">
        <div class="hero-name" id="hero-name" style="display:none"></div>
        <div class="hero-row">
          <span class="hero-number mono" id="hero-cost">$0</span>
          <span class="hero-label" id="hero-label">today</span>
        </div>
      </div>
      <div class="cap-inline" id="cap-inline">
        <a href="#" class="cap-connect" id="cap-connect" title="Connect to see real usage limits & wasted quota">Connect to Claude for quota</a>
      </div>
    </section>

    <!-- Main Grid -->
    <main class="grid">
      <!-- Sessions Table -->
      <section class="card sessions-card">
        <h2 class="card-title" id="sessions-title">Sessions</h2>
        <div class="table-scroll">
          <table>
            <thead><tr>
              <th>Name</th><th>Status</th><th class="r">Cost</th><th class="r hide-narrow">Tokens</th>
            </tr></thead>
            <tbody id="sessions-body"></tbody>
          </table>
          <div class="empty" id="sessions-empty" style="display:none">No sessions</div>
        </div>
      </section>

      <!-- Stats / Todos -->
      <section class="card">
        <h2 class="card-title" id="right-title">Stats</h2>
        <div class="table-scroll">
          <table id="stats-table">
            <thead><tr><th></th><th class="r">Sessions</th><th class="r">Tokens</th><th class="r">Cost</th></tr></thead>
            <tbody id="stats-body"></tbody>
          </table>
          <table id="todos-table" style="display:none">
            <thead><tr><th>Status</th><th>Todo</th></tr></thead>
            <tbody id="todos-body"></tbody>
          </table>
          <div class="empty" id="right-empty" style="display:none">No data</div>
        </div>
      </section>

      <!-- Charts: two side by side -->
      <section class="card chart-card">
        <h2 class="card-title" id="token-chart-title">Token Usage <span class="subtitle">30d</span></h2>
        <div class="chart-box"><canvas id="token-chart"></canvas></div>
      </section>

      <section class="card chart-card">
        <h2 class="card-title">Daily Cost</h2>
        <div class="chart-box"><canvas id="cost-chart"></canvas></div>
      </section>

      <!-- Activity -->
      <section class="card span-full">
        <div class="panel-header">
          <button class="ptab active" data-tab="activity">Activity</button>
          <button class="ptab" data-tab="messages">Messages</button>
        </div>
        <div class="feed" id="panel-content"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
