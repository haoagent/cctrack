<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cctrack</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>cctrack</h1>
      <div class="stats">
        <span><span id="agent-label">Sessions</span>: <span class="value" id="agent-count">0</span></span>
        <span>Todos: <span class="value" id="todo-progress">0/0</span></span>
        <span>Events: <span class="value" id="event-count">0</span></span>
        <span>Cost: <span class="value" id="total-cost">$0.00</span></span>
      </div>
    </div>

    <div class="tab-bar" id="tab-bar"></div>

    <div class="grid">
      <!-- Sessions/Agents Panel -->
      <div class="panel">
        <div class="panel-title" id="agents-panel-title">Sessions</div>
        <table>
          <thead>
            <tr><th>Name</th><th>Status</th><th>Tokens</th><th>Cost</th></tr>
          </thead>
          <tbody id="agents-body"></tbody>
        </table>
        <div class="empty-state" id="agents-empty" style="display:none">
          <h2 id="agents-empty-title">No sessions</h2>
          <p>Start a Claude Code session</p>
        </div>
      </div>

      <!-- Stats Panel (ALL tab only) -->
      <div class="panel" id="stats-panel">
        <div class="panel-title">Stats</div>
        <table>
          <thead>
            <tr><th></th><th style="text-align:right">Sessions</th><th style="text-align:right">Tokens</th><th style="text-align:right">Cost</th></tr>
          </thead>
          <tbody id="stats-body"></tbody>
        </table>
      </div>

      <!-- Todos Panel (team tabs only) -->
      <div class="panel" id="todos-panel" style="display:none">
        <div class="panel-title">Todos</div>
        <table>
          <thead>
            <tr><th>Status</th><th>Todo</th></tr>
          </thead>
          <tbody id="todos-body"></tbody>
        </table>
        <div class="empty-state" id="todos-empty">
          <h2>No active todos</h2>
        </div>
      </div>

      <!-- Activity Panel -->
      <div class="panel full-width">
        <div class="panel-title">Live Activity</div>
        <div class="feed" id="activity-feed"></div>
        <div class="empty-state" id="activity-empty">
          <p>Enable hooks for live activity: <code>cctrack hooks install</code></p>
        </div>
      </div>

      <!-- Messages Panel (team tabs only) -->
      <div class="panel full-width" id="messages-panel">
        <div class="panel-title">Messages</div>
        <div class="feed" id="messages-feed"></div>
        <div class="empty-state" id="messages-empty" style="display:none">
          <h2>No messages yet</h2>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
