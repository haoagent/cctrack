<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cctrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">cctrack</div>
      </div>
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">Active</div>
          <div class="stat-value" id="stat-active">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sessions</div>
          <div class="stat-value" id="stat-sessions">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Tokens</div>
          <div class="stat-value mono" id="stat-tokens">0</div>
        </div>
        <div class="stat-card accent">
          <div class="stat-label">Cost</div>
          <div class="stat-value mono" id="stat-cost">$0.00</div>
        </div>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
        <span class="theme-icon" id="theme-icon">&#9790;</span>
      </button>
    </header>

    <!-- Team Tabs -->
    <nav class="team-tabs" id="team-tabs"></nav>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Sidebar: Agent List -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-title" id="sidebar-title">Sessions</div>
        <div class="agent-list" id="agent-list"></div>
      </aside>

      <!-- Content Area -->
      <main class="content">
        <!-- Charts Row -->
        <div class="chart-row" id="chart-row">
          <div class="card chart-card chart-wide">
            <div class="card-header">
              <span class="card-title">Token Usage</span>
              <span class="card-subtitle">Last 30 days</span>
            </div>
            <div class="chart-wrap"><canvas id="token-chart"></canvas></div>
          </div>
          <div class="card chart-card">
            <div class="card-header">
              <span class="card-title">Daily Cost</span>
              <span class="card-subtitle">USD</span>
            </div>
            <div class="chart-wrap"><canvas id="cost-chart"></canvas></div>
          </div>
          <div class="card chart-card">
            <div class="card-header">
              <span class="card-title">By Project</span>
              <span class="card-subtitle">Cost breakdown</span>
            </div>
            <div class="chart-wrap"><canvas id="project-chart"></canvas></div>
          </div>
        </div>

        <!-- Bottom Panel: Activity / Todos / Messages -->
        <div class="card bottom-panel">
          <div class="panel-tabs">
            <button class="panel-tab active" data-tab="activity">Activity</button>
            <button class="panel-tab" data-tab="todos">Todos</button>
            <button class="panel-tab" data-tab="messages">Messages</button>
          </div>
          <div class="panel-content" id="panel-content"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
